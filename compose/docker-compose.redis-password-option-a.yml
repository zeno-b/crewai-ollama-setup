# Option A: REDIS_URL without password + REDIS_PASSWORD (app merges at runtime).
# Usage: docker compose -f docker-compose.yml -f compose/docker-compose.redis-password-option-a.yml up -d
#
# Set REDIS_PASSWORD in .env (and optionally change REDIS_URL host/port).

services:
  redis:
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env for this scenario}
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env for this scenario}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3

  crewai:
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
