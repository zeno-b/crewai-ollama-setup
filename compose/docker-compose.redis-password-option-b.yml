# Option B: password embedded in REDIS_URL (e.g. redis://:yourpass@redis:6379/0).
# The Redis container still needs the same password for --requirepass; set both in .env:
#   REDIS_URL=redis://:yourpass@redis:6379/0
#   REDIS_PASSWORD=yourpass
# Crewai leaves REDIS_PASSWORD empty so settings.redis_dsn() does not double-inject.
#
# Usage: docker compose -f docker-compose.yml -f compose/docker-compose.redis-password-option-b.yml up -d

services:
  redis:
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD to match the password embedded in REDIS_URL}
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD to match the password embedded in REDIS_URL}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3

  crewai:
    environment:
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL with embedded password}
      - REDIS_PASSWORD=
