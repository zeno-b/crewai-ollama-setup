# Optional overlay: RSS/Atom → dataset → automatic retrain when thresholds are met.
# Merge with base compose, e.g.:
#   docker compose -f docker-compose.yml -f compose/docker-compose.scenario.news-autopilot.yml up -d
#
# Override any variable via .env or shell.

services:
  crewai:
    environment:
      - NEWS_AUTOPILOT_ENABLED=${NEWS_AUTOPILOT_ENABLED:-false}
      - NEWS_AUTOPILOT_RSS_URL=${NEWS_AUTOPILOT_RSS_URL:-https://feeds.bbci.co.uk/news/rss.xml}
      - NEWS_AUTOPILOT_POLL_INTERVAL_SECONDS=${NEWS_AUTOPILOT_POLL_INTERVAL_SECONDS:-3600}
      - NEWS_AUTOPILOT_REQUEST_TIMEOUT_SECONDS=${NEWS_AUTOPILOT_REQUEST_TIMEOUT_SECONDS:-30}
      - NEWS_AUTOPILOT_MAX_ITEMS=${NEWS_AUTOPILOT_MAX_ITEMS:-25}
      - NEWS_AUTOPILOT_DATASET_NAME=${NEWS_AUTOPILOT_DATASET_NAME:-news_autopilot_corpus}
      - NEWS_AUTOPILOT_OUTPUT_FORMAT=${NEWS_AUTOPILOT_OUTPUT_FORMAT:-text}
      - NEWS_AUTOPILOT_MERGE_EXISTING=${NEWS_AUTOPILOT_MERGE_EXISTING:-true}
      - NEWS_AUTOPILOT_MAX_MERGED_BYTES=${NEWS_AUTOPILOT_MAX_MERGED_BYTES:-4000000}
      - NEWS_AUTOPILOT_MIN_NEW_LINES_TO_RETRAIN=${NEWS_AUTOPILOT_MIN_NEW_LINES_TO_RETRAIN:-50}
      - NEWS_AUTOPILOT_MIN_NEW_BYTES_TO_RETRAIN=${NEWS_AUTOPILOT_MIN_NEW_BYTES_TO_RETRAIN:-8000}
      - NEWS_AUTOPILOT_MIN_HOURS_BETWEEN_RETRAINS=${NEWS_AUTOPILOT_MIN_HOURS_BETWEEN_RETRAINS:-24}
      - NEWS_AUTOPILOT_RETRAIN_ON_ANY_CHANGE=${NEWS_AUTOPILOT_RETRAIN_ON_ANY_CHANGE:-false}
      - NEWS_AUTOPILOT_BASE_MODEL=${NEWS_AUTOPILOT_BASE_MODEL:-llama2:7b}
      - NEWS_AUTOPILOT_MODEL_NAME_PREFIX=${NEWS_AUTOPILOT_MODEL_NAME_PREFIX:-news-autopilot}
      - NEWS_AUTOPILOT_JOB_TYPE=${NEWS_AUTOPILOT_JOB_TYPE:-system_prompt}
      - NEWS_AUTOPILOT_TEACHER_MODEL=${NEWS_AUTOPILOT_TEACHER_MODEL:-}
      - NEWS_AUTOPILOT_TEMPLATE_NAME=${NEWS_AUTOPILOT_TEMPLATE_NAME:-}
      - NEWS_AUTOPILOT_INSTRUCTIONS=${NEWS_AUTOPILOT_INSTRUCTIONS:-}
      - NEWS_AUTOPILOT_RETRAIN_PARAMETERS_JSON=${NEWS_AUTOPILOT_RETRAIN_PARAMETERS_JSON:-{}}
      - NEWS_AUTOPILOT_RETRAIN_TIMEOUT_SECONDS=${NEWS_AUTOPILOT_RETRAIN_TIMEOUT_SECONDS:-1800}
      - NEWS_AUTOPILOT_USER_AGENT=${NEWS_AUTOPILOT_USER_AGENT:-CrewAI-NewsAutopilot/1.0}
