name: Verify requirements resolve

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pip-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (same major as Dockerfile.crewai)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m venv /tmp/req-venv
          /tmp/req-venv/bin/pip install -r requirements.txt
