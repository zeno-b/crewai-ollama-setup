[pytest]
asyncio_mode = auto
addopts = --strict-markers
testpaths = tests
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
markers =
    performance: response time and throughput expectations
    security: path traversal, injection, and auth-related checks
    slow: optional heavier tests (deselect with -m "not slow")
